<!DOCTYPE html>
<html>
<head>
    <title>QR Code Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .verify-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .info-box {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .progress-bar {
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #28a745;
            width: 100%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="verify-card">
        <div class="icon">🔐</div>
        <h2>Auto-Verification in Progress</h2>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <p>Scanning QR code and verifying report authenticity...</p>
        
        <div class="info-box" id="verification-status">
            <div class="info-row">
                <span>Status:</span>
                <span id="status-text">Verifying...</span>
            </div>
        </div>
        
        <div style="margin-top: 30px;">
            <a href="/verify_page" class="btn btn-primary">Manual Verification</a>
            <a href="/" class="btn btn-primary">Home</a>
        </div>
    </div>
    
    <script>
        // Auto-redirect after 2 seconds
        setTimeout(function() {
            window.location.href = "{{ redirect_url }}";
        }, 2000);
    </script>
</body>
</html>
